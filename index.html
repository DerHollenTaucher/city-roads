<!DOCTYPE html>
<html>
  <head>
    <meta property="og:title" content="Draw all roads in any city at once" />
    <meta property="og:image" content="https://i.imgur.com/Fbbe5a6.png" />
    <meta property="og:description" content="This website allows you to select a city and then draws every single road on a screen." />
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=700, initial-scale=1.0, user-scalable=no">
    <meta charset="utf-8">
    <meta name="Description" content="This website allows you to select a city and then draws every single road on a screen.">
    <meta name="keywords" content="city roads visualization, roads, graph, visualization, anvaka, retro, map art" />
    <meta name="author" content="Andrei Kashcha">

    <!-- Retro, Pixel, Gothic, and typewriter fonts via Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;700&family=Roboto+Mono:wght@400;700&family=Fruktur&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

    <title>city-roads | retro</title>
    <style>
      body {
        background: linear-gradient(135deg, #c0c9ad 0%, #f2eecb 100%);
        min-height: 100vh;
        margin: 0;
        font-family: 'IBM Plex Mono', 'VT323', monospace;
        color: #222;
        /* extra glow for retro monitors */
        text-shadow: 0 1px 2px #cbe2b0;
      }
      #host {
        filter: drop-shadow(0 2px 16px #465c1b44);
      }
      .retro-panel {
        background: #060606e8;
        border: 2px solid #cbe2b0;
        border-radius: 8px;
        box-shadow: 0 0 0 4px #b0bc8677, 0 8px 48px #2228;
        padding: 2rem 2.5rem;
        margin: 2rem auto;
        width: 95%;
        max-width: 800px;
      }
      .retro-btn, button {
        font-family: 'VT323', 'IBM Plex Mono', monospace;
        font-size: 1.3em;
        color: #2f3010;
        background: #89ff9b;
        padding: 0.45em 1.2em;
        border: 2px solid #3f3f1b;
        border-radius: 10px;
        box-shadow: 0 2px 0 #92bf8f, 0 5px 24px #2225;
        cursor: pointer;
        transition: background 0.2s, color 0.2s;
      }
      .retro-btn:active {
        background: #cbe2b0;
      }
      .retro-label {
        color: #deff7f;
        font-weight: bold;
        font-family: 'Fruktur', 'UnifrakturCook', cursive, monospace;
        font-size: 1.1em;
        text-shadow: 0 1px 6px #3f3f1b88;
      }
      input, select, textarea {
        font-family: 'IBM Plex Mono', 'VT323', monospace;
        color: #3f3f1b;
        background: #e6e6d7;
        border: 1px solid #89ff9b;
        border-radius: 6px;
        padding: 0.2em 0.5em;
      }
      .font-sample {
        font-size: 1.1em;
        margin-left: 8px;
      }
    </style>
  </head>
  <body>
    <canvas id='canvas'></canvas>
    <div id="host"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
